[build]
buildCommand = "pnpm --filter @bitremit/database run db:generate && pnpm --filter @bitremit/blockchain run build"

[deploy]
startCommand = "pnpm --filter @bitremit/blockchain start"
restartPolicyType = "on_failure"

# This is a worker service — it has no HTTP port to expose.
# It runs the blockchain indexer and BullMQ off-ramp worker as a continuous process.
