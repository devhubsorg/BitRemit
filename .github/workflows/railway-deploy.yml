name: Railway Deploy

# ────────────────────────────────────────────────────────────────────────────
# Triggers
# ────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: false
        default: all
        type: choice
        options:
          - all
          - mpesa-mock
          - blockchain-worker
          - bots

# Never run two deploys for the same ref at the same time.
concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: false

# ────────────────────────────────────────────────────────────────────────────
# Job: changes
# ────────────────────────────────────────────────────────────────────────────
jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      mpesa: ${{ steps.filter.outputs.mpesa }}
      blockchain: ${{ steps.filter.outputs.blockchain }}
      bots: ${{ steps.filter.outputs.bots }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mpesa:
              - 'mocks/mpesa/**'
              - 'mocks/package.json'
              - 'pnpm-lock.yaml'
              - 'package.json'
            blockchain:
              - 'packages/blockchain/**'
              - 'packages/database/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
            bots:
              - 'apps/bots/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'

  # ────────────────────────────────────────────────────────────────────────────
  # Job: deploy-mpesa-mock
  # ────────────────────────────────────────────────────────────────────────────
  deploy-mpesa-mock:
    name: "Deploy · M-Pesa Mock"
    needs: changes
    if: >-
      (github.event_name == 'push' && needs.changes.outputs.mpesa == 'true') ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.service == 'all' || github.event.inputs.service == 'mpesa-mock'))
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy to Railway
        working-directory: mocks/mpesa
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service mpesa-mock

      - name: Smoke-test · Health endpoint
        continue-on-error: true
        run: |
          if [ -z "$MPESA_MOCK_URL" ]; then
            echo "MPESA_MOCK_URL secret not set — skipping health check"
            exit 0
          fi
          echo "Waiting 90 s for Railway to build and start the image..."
          sleep 90
          for i in 1 2 3 4 5 6; do
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              "$MPESA_MOCK_URL/health" 2>/dev/null || echo "000")
            echo "Attempt $i/6 — HTTP $HTTP"
            [ "$HTTP" = "200" ] && { echo "✓ M-Pesa Mock is healthy"; exit 0; }
            sleep 15
          done
          echo "✗ Health check did not pass within the allotted time (deploy may still be in progress)"
        env:
          MPESA_MOCK_URL: ${{ secrets.MPESA_MOCK_URL }}

  # ────────────────────────────────────────────────────────────────────────────
  # Job: deploy-blockchain-worker
  # ────────────────────────────────────────────────────────────────────────────
  deploy-blockchain-worker:
    name: "Deploy · Blockchain Worker"
    needs: changes
    if: >-
      (github.event_name == 'push' && needs.changes.outputs.blockchain == 'true') ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.service == 'all' || github.event.inputs.service == 'blockchain-worker'))
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy to Railway
        working-directory: packages/blockchain
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service blockchain-worker

  # ────────────────────────────────────────────────────────────────────────────
  # Job: deploy-bots
  # ────────────────────────────────────────────────────────────────────────────
  deploy-bots:
    name: "Deploy · Bots"
    needs: changes
    if: >-
      (github.event_name == 'push' && needs.changes.outputs.bots == 'true') ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.service == 'all' || github.event.inputs.service == 'bots'))
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy to Railway
        working-directory: apps/bots
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service bots

  # ────────────────────────────────────────────────────────────────────────────
  # Job: deploy-summary
  # ────────────────────────────────────────────────────────────────────────────
  deploy-summary:
    name: Deploy summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - deploy-mpesa-mock
      - deploy-blockchain-worker
      - deploy-bots
    if: always()
    steps:
      - name: Print outcomes
        run: |
          echo "┌─────────────────────┬──────────────┐"
          echo "│ Service             │ Result       │"
          echo "├─────────────────────┼──────────────┤"
          printf "│ %-19s │ %-12s │\n" "mpesa-mock"          "${{ needs.deploy-mpesa-mock.result }}"
          printf "│ %-19s │ %-12s │\n" "blockchain-worker"   "${{ needs.deploy-blockchain-worker.result }}"
          printf "│ %-19s │ %-12s │\n" "bots"                "${{ needs.deploy-bots.result }}"
          echo "└─────────────────────┴──────────────┘"
